appId: com.rendyhd.vicu
productName: Vicu
copyright: Copyright (c) 2024-2026 rendyhd

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - resources/**/*
  - "!node_modules/**/{test,__tests__,tests,*.test.*,*.spec.*}"

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
  - from: extensions/
    to: extensions/
    filter:
      - "**/*"

asarUnpack:
  - "node_modules/koffi/**"

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  license: LICENSE
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false
  differentialPackage: false

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
  extendInfo:
    NSAppleEventsUsageDescription: "Vicu needs automation access to detect the active browser tab for quick task entry."

linux:
  icon: build/icon.png
  category: Utility
  synopsis: Task management app powered by Vikunja
  description: A personal task manager for your desktop, powered by Vikunja. Frictionless capture, keyboard-driven review, and deep integration with your browser.
  maintainer: rendyhd
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  desktop:
    entry:
      StartupWMClass: Vicu
      Comment: Task management app powered by Vikunja
      Keywords: task;todo;productivity;vikunja;

appImage:
  artifactName: "${productName}-${version}-${arch}.${ext}"

dmg:
  sign: false
  writeUpdateInfo: false
  artifactName: "${productName}-${version}-${arch}.${ext}"

publish:
  provider: github
  releaseType: release
  publishAutoUpdate: false
